<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>Broccolli | Login</title>
  </head>
  <body>
    <section class="relative min-h-dvh h-dvh">
      <main
        class="text-[#f4f4f4] bg-[url('images/herobgImage-2.webp')] bg-cover bg-center bg-no-repeat bg-red-200 h-full flex items-center justify-center"
      >
        <aside
          class="w-full max-w-md mx-auto grow bg-[#14181b]/70 flex flex-col py-10 px-10 rounded-md"
        >
          <form class="flex flex-col gap-4">
            <!-- EMAIL -->
            <div class="relative">
              <input
                type="email"
                id="email"
                placeholder="Enter email address"
                class="w-full border border-gray-300 rounded px-10 py-2 focus:outline-none focus:ring-2 focus:ring-[#80b500]"
              />
              <ion-icon
                name="mail-outline"
                class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"
              ></ion-icon>
            </div>

            <!-- PASSWORD -->
            <div class="relative">
              <input
                type="password"
                id="password"
                placeholder="Enter password"
                class="w-full border border-gray-300 rounded px-10 py-2 focus:outline-none focus:ring-2 focus:ring-[#80b500]"
              />
              <ion-icon
                name="lock-closed-outline"
                class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"
              ></ion-icon>
            </div>

            <!-- REMEMBER ME -->
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" class="accent-[#80b500]" />
              Remember me
            </label>

            <!-- LOGIN BUTTON -->
            <button
              type="submit"
              class="bg-[#80b500] hover:bg-[#6ea000] transition text-white font-bold py-2 rounded"
            >
              Login
            </button>
          </form>

          <!-- FORGOT PASSWORD -->
          <a
            href="#"
            class="text-sm text-[#80b500] mt-2 inline-block hover:underline"
          >
            Forgotten password?
          </a>
        </aside>
      </main>
    </section>
    <!-- prettier-ignore -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <!-- prettier-ignore -->
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  </body>
</html>
